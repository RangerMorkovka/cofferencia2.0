name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          
      - name: Install dependencies
        run: npm ci
        working-directory: ./frontend # Заходим в папку фронтенда
        
      - name: Build project
        run: npm run build
        working-directory: ./frontend # Запускаем сборку из папки фронтенда
        
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './frontend/dist' # Указываем путь к собранной папке
          
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
